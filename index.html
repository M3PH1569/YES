    <style>
        :root {
            /* VS Code Dark+ Color Palette */
            --bg-color: #1e1e1e; 
            --text-color: #d4d4d4; 
            --prompt-color: #4ec9b0; 
            --keyword-color: #569cd6; 
            --string-color: #ce9178; 
            --comment-color: #6a9955; 
            --function-color: #dcdcaa; 
            --variable-color: #9cdcfe;

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #050505; 
            color: var(--text-color);
            font-family: 'Fira Code', Consolas, 'Courier New', monospace;

        }

        /* Matrix Digital Rain Background */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            opacity: 0.15;
        }

        /* Main Content */
        #mainContent {
            display: flex;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--prompt-color);
            box-shadow: 0 0 15px rgba(78, 201, 176, 0.5);
            margin-bottom: 10px;
            z-index: 10;
        }

        /* Glitch Effect on Header */
        .title {
            font-family: 'Fira Code', monospace;
            font-size: 1.5rem;
            margin: 0 0 20px 0;
            color: var(--prompt-color);
            text-shadow: 0 0 8px rgba(78, 201, 176, 0.8);
            letter-spacing: 3px;
            z-index: 10;
            animation: glitchText 4s infinite;
        }

        @keyframes glitchText {
            0%, 94% { text-shadow: 0 0 8px rgba(78, 201, 176, 0.8); color: var(--prompt-color); transform: none; }
            95% { text-shadow: -3px 0 red, 3px 0 blue; color: white; transform: skewX(-15deg); }
            96% { text-shadow: 3px 0 red, -3px 0 blue; color: white; transform: skewX(15deg); }
            97% { text-shadow: 0 0 8px rgba(78, 201, 176, 0.8); color: var(--prompt-color); transform: none; }
        }

        /* Scanlines overlay */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 50;
            pointer-events: none;
            opacity: 0.5;
        }

        .terminal {
            display: flex;
            flex-direction: column;
            width: 90%;
            max-width: 850px;
            height: 480px; 
            background-color: rgba(15, 15, 15, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 12px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
            overflow: hidden;
        }

        .terminal-header-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(30, 30, 30, 0.7);
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .terminal-title {
            color: #aaa;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .terminal-body {
            padding: 1.5rem;
            font-size: 0.95rem; 
            line-height: 1.6;
            overflow-y: auto; 
            flex-grow: 1;
        }

        .terminal-body::-webkit-scrollbar { width: 8px; }
        .terminal-body::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        .terminal-body::-webkit-scrollbar-track { background: transparent; }

        .window-controls {
            display: flex;
            gap: 8px;
            position: absolute;
            left: 15px;
        }
        .window-controls span {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.3);
        }
        .close-btn { background-color: #ff5f56; }
        .min-btn { background-color: #ffbd2e; }
        .max-btn { background-color: #27c93f; }

        .header { margin-bottom: 1rem; }
        .prompt { color: var(--prompt-color); font-weight: 500; }
        .content { display: inline; }

        /* Syntax Highlighting Classes */
        .keyword { color: var(--keyword-color); }
        .string { color: var(--string-color); }
        .comment { color: var(--comment-color); font-style: italic; }
        .function { color: var(--function-color); }
        .variable { color: var(--variable-color); }
        
        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.1em;
            background-color: #d4d4d4;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
